<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rumbadoo - Encuentra tu ritmo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root{
  --p900:#2d1b69;--p800:#4a2c8a;--p700:#6b3fa0;--p600:#8b5cf6;--p500:#a78bfa;
  --p400:#c4b5fd;--p300:#ddd6fe;--p200:#ede9fe;--p100:#f5f3ff;
  --rose:#f43f5e;--pink:#ec4899;--gold:#fbbf24;
  --white:#fff;--g50:#fafafa;--g100:#f4f4f5;--g200:#e4e4e7;--g300:#d4d4d8;
  --g400:#a1a1aa;--g500:#71717a;--g600:#52525b;--g700:#3f3f46;--g800:#27272a;
  --shadow:0 4px 24px rgba(74,44,138,.12);
  --shadow-lg:0 8px 40px rgba(74,44,138,.18);
  --r:20px;--rs:12px;--rf:9999px;
  --t:.3s cubic-bezier(.4,0,.2,1);
  --f:'Nunito',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:var(--f);background:linear-gradient(135deg,#2d1b69,#4a2c8a 30%,#6b3fa0 60%,#8b5cf6);color:var(--g900);overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 30%,rgba(139,92,246,.15) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(196,181,253,.12) 0%,transparent 50%),radial-gradient(circle at 50% 50%,rgba(216,180,254,.08) 0%,transparent 60%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--p400);border-radius:3px}
#app{position:relative;z-index:1;width:100%;max-width:480px;height:100vh;margin:0 auto;display:flex;flex-direction:column;background:var(--white);box-shadow:0 20px 60px rgba(74,44,138,.25);overflow:hidden}
.hidden{display:none!important}

/* AUTH */
#auth-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:linear-gradient(160deg,var(--p100),var(--white) 50%,var(--p200));overflow-y:auto}
.auth-logo{font-size:48px;font-weight:900;background:linear-gradient(135deg,var(--p700),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;letter-spacing:-1px}
.auth-sub{color:var(--g500);font-size:14px;margin-bottom:8px;font-weight:600}
.auth-toggle{display:flex;gap:4px;background:var(--p100);border-radius:var(--rf);padding:4px;margin-bottom:24px;width:100%;max-width:360px}
.auth-toggle button{flex:1;padding:10px 16px;border:none;border-radius:var(--rf);font-family:var(--f);font-size:14px;font-weight:700;cursor:pointer;transition:var(--t);background:transparent;color:var(--g500)}
.auth-toggle button.active{background:var(--white);color:var(--p700);box-shadow:var(--shadow)}
.auth-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px}
.auth-form label{font-size:13px;font-weight:700;color:var(--p800);margin-bottom:-8px}
.auth-form input,.auth-form select,.auth-form textarea{width:100%;padding:12px 16px;border:2px solid var(--p200);border-radius:var(--rs);font-family:var(--f);font-size:15px;background:var(--white);transition:var(--t);outline:none}
.auth-form input:focus,.auth-form select:focus,.auth-form textarea:focus{border-color:var(--p500);box-shadow:0 0 0 4px rgba(139,92,246,.15)}
.auth-form textarea{resize:vertical;min-height:64px}
.auth-error{color:var(--rose);font-size:13px;font-weight:600;text-align:center;min-height:20px}

.btn-primary{padding:14px 24px;border:none;border-radius:var(--rf);font-family:var(--f);font-size:16px;font-weight:800;color:var(--white);background:linear-gradient(135deg,var(--p600),var(--p700));cursor:pointer;transition:var(--t);box-shadow:0 4px 16px rgba(139,92,246,.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(139,92,246,.45)}
.btn-primary:active{transform:translateY(0)}
.avatar-preview-wrap{display:flex;align-items:center;gap:12px;margin-top:4px}
.avatar-preview-wrap img{width:56px;height:56px;border-radius:50%;object-fit:cover;border:3px solid var(--p300);background:var(--p100)}

/* MAIN */
#main-screen{flex:1;display:flex;flex-direction:column}
.main-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:relative;z-index:10}
.main-header .logo{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--p700),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:8px;border-radius:50%;transition:var(--t);color:var(--g600);position:relative}
.header-btn:hover{background:var(--p100);color:var(--p700)}
.badge{position:absolute;top:0;right:0;background:var(--rose);color:var(--white);font-size:10px;font-weight:800;min-width:18px;height:18px;border-radius:var(--rf);display:flex;align-items:center;justify-content:center;padding:0 4px;transform:translate(4px,-4px)}

.tab-bar{display:flex;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--p100);padding:0 8px}
.tab-btn{flex:1;padding:10px 8px 12px;background:none;border:none;font-family:var(--f);font-size:13px;font-weight:700;color:var(--g400);cursor:pointer;transition:var(--t);position:relative;display:flex;align-items:center;justify-content:center;gap:6px}
.tab-btn .tab-icon{font-size:18px}
.tab-btn.active{color:var(--p700)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:32px;height:3px;background:linear-gradient(90deg,var(--p500),var(--p700));border-radius:3px 3px 0 0}
.tab-content{flex:1;overflow:hidden;position:relative}
.tab-pane{position:absolute;inset:0;overflow-y:auto;padding:16px;display:none}
.tab-pane.active{display:block}

/* DISCOVER */
#discover-pane{display:none;flex-direction:column;align-items:center;justify-content:center;padding:0}
#discover-pane.active{display:flex}
.card-stack{position:relative;width:100%;max-width:400px;height:480px;margin:12px auto 8px}
.profile-card{position:absolute;width:100%;height:100%;border-radius:var(--r);overflow:hidden;background:var(--white);box-shadow:var(--shadow-lg);transition:transform .35s ease,opacity .35s ease;cursor:grab;user-select:none;touch-action:none}
.profile-card .card-bg{width:100%;height:100%;object-fit:cover;display:block}
.profile-card .card-overlay{position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.7))}
.profile-card .card-info{position:absolute;bottom:0;left:0;right:0;padding:24px 20px 20px;color:var(--white)}
.profile-card .card-name{font-size:26px;font-weight:800}
.profile-card .card-age{font-weight:600;font-size:20px;opacity:.9}
.profile-card .card-bio{font-size:14px;font-weight:400;opacity:.85;margin-top:4px;line-height:1.4}
.profile-card .card-gender{display:inline-block;font-size:12px;font-weight:700;background:rgba(255,255,255,.2);backdrop-filter:blur(4px);padding:2px 12px;border-radius:var(--rf);margin-top:6px}
.swipe-indicator{position:absolute;top:32px;padding:8px 20px;border-radius:var(--rs);font-size:28px;font-weight:900;opacity:0;transform:rotate(-16deg);pointer-events:none;transition:opacity .15s;z-index:5}
.swipe-indicator.like{left:24px;color:var(--rose);border:4px solid var(--rose)}
.swipe-indicator.nope{right:24px;color:var(--g400);border:4px solid var(--g400)}
.swipe-indicator.show{opacity:1}
.card-actions{display:flex;align-items:center;justify-content:center;gap:24px;padding:8px 0 16px}
.action-btn{width:60px;height:60px;border-radius:50%;border:none;font-size:28px;cursor:pointer;transition:var(--t);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);background:var(--white)}
.action-btn:hover{transform:scale(1.1)}
.action-btn:active{transform:scale(.9)}
.action-btn.pass{color:var(--g400);border:2px solid var(--g200)}
.action-btn.like{color:var(--rose);border:2px solid #fecdd3}
.action-btn.like:hover{background:#fff1f2;border-color:var(--rose);box-shadow:0 4px 20px rgba(244,63,94,.25)}
.action-btn.super{color:var(--gold);border:2px solid #fef3c7;font-size:22px}
.no-more{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;color:var(--g500)}
.no-more .emoji-big{font-size:64px;margin-bottom:12px}
.no-more h3{font-size:20px;font-weight:800;color:var(--p700);margin-bottom:4px}
.no-more p{font-size:14px}

/* MATCHES */
#matches-pane .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
#matches-pane .section-header h2{font-size:20px;font-weight:800;color:var(--p800)}
.match-count{background:var(--p100);color:var(--p700);padding:2px 14px;border-radius:var(--rf);font-size:14px;font-weight:800}
.matches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.match-card{background:var(--white);border-radius:var(--rs);overflow:hidden;box-shadow:var(--shadow);text-align:center;padding-bottom:12px;animation:fadeUp .4s ease backwards;border:2px solid transparent}
.match-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--p300)}
.match-card img{width:100%;height:140px;object-fit:cover;display:block;background:var(--p100)}
.match-card .match-name{font-weight:700;font-size:14px;margin-top:8px;color:var(--g800)}
.match-card .match-age{font-size:12px;color:var(--g500);font-weight:600}
.empty-state{text-align:center;padding:60px 24px;color:var(--g400)}
.empty-state .emoji-big{font-size:56px;margin-bottom:8px}
.empty-state h3{font-weight:700;font-size:18px;color:var(--g500)}

/* MODAL MATCH */
.match-modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(45,27,105,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease;padding:20px}
.match-modal{background:var(--white);border-radius:var(--r);padding:40px 32px 32px;text-align:center;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(74,44,138,.25);animation:bounceIn .5s ease backwards;position:relative;overflow:hidden}
.match-modal::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--p500),var(--pink),var(--gold),var(--pink),var(--p500));background-size:200% 100%;animation:shimmer 2s linear infinite}
.match-modal .match-emoji{font-size:72px;animation:heartBeat 1s ease infinite;display:block;margin-bottom:4px}
.match-modal h2{font-size:32px;font-weight:900;background:linear-gradient(135deg,var(--p700),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.match-modal p{color:var(--g500);font-weight:600;margin-bottom:20px}
.match-modal .match-profiles{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:24px}
.match-modal .match-profiles img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--p300)}
.match-modal .match-profiles .heart-icon{font-size:32px;color:var(--rose)}

/* EDIT PROFILE MODAL */
.edit-overlay{position:fixed;inset:0;z-index:900;background:rgba(45,27,105,.6);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;animation:fadeIn .25s ease;padding:20px}
.edit-modal{background:var(--white);border-radius:var(--r);padding:28px 24px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(74,44,138,.25);animation:bounceIn .35s ease backwards}
.edit-modal h2{font-size:22px;font-weight:800;color:var(--p800);text-align:center;margin-bottom:20px}
.edit-form{display:flex;flex-direction:column;gap:14px}
.edit-form label{font-size:13px;font-weight:700;color:var(--p800);margin-bottom:-8px}
.edit-form input,.edit-form select,.edit-form textarea{width:100%;padding:12px 16px;border:2px solid var(--p200);border-radius:var(--rs);font-family:var(--f);font-size:15px;background:var(--white);transition:var(--t);outline:none}
.edit-form textarea{resize:vertical;min-height:56px}
.edit-photo-area{display:flex;align-items:center;gap:14px}
.edit-photo-area img{width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid var(--p300);background:var(--p100);flex-shrink:0}
.edit-photo-area .photo-inputs{flex:1;display:flex;flex-direction:column;gap:6px}
.edit-photo-area .photo-inputs input[type=file]{font-size:13px;padding:6px 0;border:none}
.edit-photo-area .photo-inputs input[type=url]{font-size:13px;padding:8px 12px}
.edit-actions{display:flex;gap:10px;margin-top:4px}
.btn-secondary{flex:1;padding:14px 24px;border:2px solid var(--p200);border-radius:var(--rf);font-family:var(--f);font-size:16px;font-weight:800;color:var(--g500);background:var(--white);cursor:pointer;transition:var(--t)}
.btn-secondary:hover{border-color:var(--p400);color:var(--p700);background:var(--p50)}

/* ADMIN */
#admin-screen{position:fixed;inset:0;z-index:500;background:var(--white);display:flex;flex-direction:column;animation:fadeIn .3s ease}
.admin-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--p900);color:var(--white)}
.admin-header h2{font-size:18px;font-weight:800}
.admin-close{background:none;border:none;color:var(--white);font-size:24px;cursor:pointer;padding:4px 8px}
.admin-body{flex:1;overflow-y:auto;padding:16px 20px}
.admin-stats{display:flex;gap:12px;margin-bottom:16px}
.admin-stat-card{flex:1;padding:14px;border-radius:var(--rs);text-align:center;background:var(--p100)}
.admin-stat-card .num{font-size:28px;font-weight:900;color:var(--p700)}
.admin-stat-card .label{font-size:12px;font-weight:700;color:var(--g500)}
.admin-profile-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--g50);border-radius:var(--rs);margin-bottom:8px;border:1px solid var(--g200)}
.admin-profile-item img{width:44px;height:44px;border-radius:50%;object-fit:cover}
.admin-profile-item .info{flex:1;min-width:0}
.admin-profile-item .info .name{font-weight:700;font-size:14px}
.admin-profile-item .info .detail{font-size:12px;color:var(--g500)}
.admin-profile-item .admin-del-btn{padding:6px 14px;border:none;border-radius:var(--rs);font-family:var(--f);font-size:12px;font-weight:700;color:var(--white);background:var(--rose);cursor:pointer;transition:var(--t)}
.admin-profile-item .admin-del-btn:hover{background:#e11d48}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounceIn{0%{opacity:0;transform:scale(.7)}60%{transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
@keyframes heartBeat{0%,100%{transform:scale(1)}15%{transform:scale(1.25)}30%{transform:scale(1)}45%{transform:scale(1.15)}60%{transform:scale(1)}}
@keyframes shimmer{0%{background-position:0 50%}100%{background-position:200% 50%}}
@keyframes floatHearts{0%{opacity:1;transform:translateY(0) scale(0) rotate(0)}50%{opacity:.8;transform:translateY(-40vh) scale(1) rotate(180deg)}100%{opacity:0;transform:translateY(-80vh) scale(.5) rotate(360deg)}}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-10vh) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
.heart-particle{position:fixed;z-index:9999;pointer-events:none;font-size:24px;animation:floatHearts 2.5s ease-out forwards}
.confetti-piece{position:fixed;z-index:9998;pointer-events:none;width:10px;height:10px;animation:confettiFall 2.5s ease-in forwards}

@media(max-width:500px){
  #app{max-width:100%}.card-stack{height:420px}
  .profile-card .card-name{font-size:22px}
  .profile-card .card-info{padding:18px 16px 14px}
  .action-btn{width:52px;height:52px;font-size:22px}
  .matches-grid{grid-template-columns:repeat(2,1fr)}
  .match-modal{padding:32px 20px 24px}
  .match-modal .match-profiles img{width:64px;height:64px}
  .admin-stats{flex-direction:column}
}
@media(max-width:360px){
  .card-stack{height:360px}
  .action-btn{width:46px;height:46px;font-size:18px;gap:16px}
}
</style>
</head>
<body>
<div id="app">

  <!-- ==================== AUTH ==================== -->
  <div id="auth-screen">
    <div class="auth-logo">💜 Rumbadoo</div>
    <div class="auth-sub">Encuentra tu ritmo</div>
    <div class="auth-toggle">
      <button id="tab-login" class="active">Iniciar sesión</button>
      <button id="tab-register">Registrarse</button>
    </div>
    <div class="auth-error" id="auth-error"></div>

    <form class="auth-form" id="login-form">
      <label for="login-name">Nombre</label>
      <input type="text" id="login-name" placeholder="Tu nombre" required>
      <label for="login-pass">Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••" required>
      <button type="submit" class="btn-primary">💜 Entrar</button>
    </form>

    <form class="auth-form hidden" id="register-form">
      <label for="reg-name">Nombre</label>
      <input type="text" id="reg-name" placeholder="Ej: Carlos" required>
      <label for="reg-pass">Contraseña</label>
      <input type="password" id="reg-pass" placeholder="Mínimo 4 caracteres" minlength="4" required>
      <label for="reg-age">Edad</label>
      <input type="number" id="reg-age" placeholder="18" min="18" max="120" required>
      <label for="reg-gender">Género</label>
      <select id="reg-gender">
        <option value="Hombre">Hombre</option>
        <option value="Mujer">Mujer</option>
        <option value="No binario">No binario</option>
        <option value="Otro">Otro</option>
      </select>
      <label for="reg-bio">Frase de perfil</label>
      <textarea id="reg-bio" placeholder="Cuéntanos algo divertido..." maxlength="150"></textarea>
      <label for="reg-photo">Foto (URL opcional)</label>
      <div class="avatar-preview-wrap">
        <img id="avatar-preview" src="https://ui-avatars.com/api/?name=T&background=8b5cf6&color=fff&size=128" alt="">
        <input type="url" id="reg-photo" placeholder="https://... o déjalo vacío">
      </div>
      <button type="submit" class="btn-primary">💜 ¡Registrarse!</button>
    </form>
  </div>

  <!-- ==================== MAIN ==================== -->
  <div id="main-screen" class="hidden">
    <div class="main-header">
      <span class="logo">💜 Rumbadoo</span>
      <div style="display:flex;gap:4px">
        <button class="header-btn" id="btn-likes" title="Mis likes">👍</button>
        <button class="header-btn" id="btn-profile" title="Mi perfil">👤</button>
        <button class="header-btn" id="btn-logout" title="Cerrar sesión">🚪</button>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="discover"><span class="tab-icon">🔍</span> Descubrir</button>
      <button class="tab-btn" data-tab="matches"><span class="tab-icon">💕</span> Matches <span class="badge hidden" id="matches-badge">0</span></button>
    </div>
    <div class="tab-content">
      <div class="tab-pane active" id="discover-pane">
        <div class="card-stack" id="card-stack"></div>
        <div class="card-actions" id="card-actions">
          <button class="action-btn pass" id="btn-pass">👎</button>
          <button class="action-btn like" id="btn-like">❤️</button>
          <button class="action-btn super" id="btn-super">⭐</button>
        </div>
        <div class="no-more hidden" id="no-more">
          <div class="emoji-big">🌈</div>
          <h3>¡No hay más perfiles!</h3>
          <p>Vuelve pronto para ver nuevos rumbos.</p>
        </div>
      </div>
      <div class="tab-pane" id="matches-pane">
        <div class="section-header"><h2>💕 Tus matches</h2><span class="match-count" id="match-count">0</span></div>
        <div class="matches-grid" id="matches-grid"></div>
        <div class="empty-state hidden" id="matches-empty"><div class="emoji-big">💔</div><h3>Sin matches todavía</h3><p>¡Sigue explorando perfiles!</p></div>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen" class="hidden">
  <div class="admin-header"><h2>🛡️ Panel Admin</h2><button class="admin-close" id="admin-close">✕</button></div>
  <div class="admin-body">
    <div class="admin-stats" id="admin-stats"></div>
    <h3 style="font-size:16px;font-weight:800;color:var(--p800);margin-bottom:12px;">Perfiles registrados</h3>
    <div id="admin-profile-list"></div>
  </div>
</div>

<!-- MATCH MODAL -->
<div class="match-modal-overlay hidden" id="match-modal">
  <div class="match-modal">
    <span class="match-emoji">💜</span>
    <h2>¡Es un Match!</h2>
    <p>También le gustas a esta persona</p>
    <div class="match-profiles">
      <img id="match-my-avatar" src="" alt="Tú">
      <span class="heart-icon">💜</span>
      <img id="match-their-avatar" src="" alt="Match">
    </div>
    <button class="btn-primary" id="match-continue">💜 ¡Seguir conociendo!</button>
  </div>
</div>

<!-- EDIT PROFILE MODAL -->
<div class="edit-overlay hidden" id="edit-overlay">
  <div class="edit-modal">
    <h2>✏️ Editar perfil</h2>
    <form class="edit-form" id="edit-form">

// ─── MINISQL (IndexedDB) ─────────────────────────────────────
class MiniSQL{
  constructor(n,v){this.n=n;this.v=v;this.db=null}
  open(stores){
    return new Promise((rs,rj)=>{
      const r=indexedDB.open(this.n,this.v);
      r.onupgradeneeded=e=>{
        const d=e.target.result;
        stores.forEach(s=>{
          if(!d.objectStoreNames.contains(s.name)){
            const st=d.createObjectStore(s.name,{keyPath:s.key||'id',autoIncrement:!!s.auto});
            if(s.indexes)s.indexes.forEach(i=>st.createIndex(i.name,i.key,i.opts||{}));
          }
        });
      };
      r.onsuccess=e=>{this.db=e.target.result;rs()};
      r.onerror=e=>rj(e.target.error);
    });
  }
  insert(store,data){
    return new Promise((rs,rj)=>{
      const tx=this.db.transaction(store,'readwrite');
      const st=tx.objectStore(store);
      const r=st.put(data);
      r.onsuccess=()=>rs(data);
      r.onerror=()=>rj(r.error);
    });
  }
  select(store,q){
    return new Promise((rs,rj)=>{
      const tx=this.db.transaction(store,'readonly');
      const st=tx.objectStore(store);
      let r;
      if(!q)r=st.getAll();
      else if(q.id)r=st.get(q.id);
      else if(q.index&&q.value)r=st.index(q.index).getAll(q.value);
      else r=st.getAll();
      r.onsuccess=()=>rs(r.result);
      r.onerror=()=>rj(r.error);
    });
  }
  selectAll(store){return this.select(store)}
  update(store,data){return this.insert(store,data)}
  delete(store,id){
    return new Promise((rs,rj)=>{
      const tx=this.db.transaction(store,'readwrite');
      tx.objectStore(store).delete(id);
      tx.oncomplete=()=>rs();
      tx.onerror=()=>rj(tx.error);
    });
  }
}

// ─── UTILERÍAS ───────────────────────────────────────────────
const $=id=>document.getElementById(id);
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function hashPass(pw){let h=0;for(let i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h|=0}return 'h'+Math.abs(h).toString(36)}
function avatarUrl(name){const c=['8b5cf6','7c3aed','6b3fa0','4a2c8a','a78bfa','c4b5fd','ddd6fe','e6d5f5','2d1b69'];return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=${c[name.length%c.length]}&color=fff&size=256&bold=true`}

// ─── ESTADO ──────────────────────────────────────────────────
let db,currentUser=null,isSwiping=false,loading=false;
const STORE_P='profiles',STORE_I='interactions',STORE_M='matches';
const STORES=[
  {name:STORE_P,key:'id',indexes:[{name:'by_name',key:'name'}]},
  {name:STORE_I,key:'id',indexes:[{name:'by_from',key:'fromId'},{name:'by_to',key:'toId'}]},
  {name:STORE_M,key:'id',indexes:[{name:'by_user1',key:'user1Id'},{name:'by_user2',key:'user2Id'}]}
];

// ─── DOM REFS ────────────────────────────────────────────────
const authSc=$('auth-screen'),mainSc=$('main-screen');
const loginForm=$('login-form'),registerForm=$('register-form');
const tabLogin=$('tab-login'),tabRegister=$('tab-register');
const authErr=$('auth-error');
const cardStack=$('card-stack'),noMore=$('no-more'),cardActions=$('card-actions');
const btnLike=$('btn-like'),btnPass=$('btn-pass'),btnSuper=$('btn-super');
const matchesGrid=$('matches-grid'),matchesEmpty=$('matches-empty'),matchCount=$('match-count');
const matchModal=$('match-modal'),matchMyAvatar=$('match-my-avatar'),matchTheirAvatar=$('match-their-avatar'),matchContinue=$('match-continue');
const matchesBadge=$('matches-badge');
const adminSc=$('admin-screen'),adminClose=$('admin-close');
const editOverlay=$('edit-overlay'),editForm=$('edit-form');
const editName=$('edit-name'),editAge=$('edit-age'),editGender=$('edit-gender'),editBio=$('edit-bio');
const editPhotoPreview=$('edit-photo-preview'),editPhotoFile=$('edit-photo-file'),editPhotoUrl=$('edit-photo-url'),editCancel=$('edit-cancel');

// ─── INICIO ──────────────────────────────────────────────────
async function init(){
  db=new MiniSQL('RumbadooDB',1);
  await db.open(STORES);

  // Crear admin por defecto
  const admins=await db.select(STORE_P,{index:'by_name',value:'__admin__'});
  if(!admins||!admins.length)await db.insert(STORE_P,{id:'admin_'+genId(),name:'__admin__',password:hashPass('admin123'),role:'admin',createdAt:new Date().toISOString()});

  // Cargar perfiles de ejemplo si es primera vez
  const existing=await db.selectAll(STORE_P)||[];
  const sampleIds=existing.filter(p=>p.id?.startsWith('sample_')).length;
  if(sampleIds===0){
    for(const sp of SAMPLE_PROFILES){
      const dup=await db.select(STORE_P,{index:'by_name',value:sp.name});
      if(!dup||!dup.length)await db.insert(STORE_P,{...sp,id:'sample_'+genId(),password:hashPass('sample'),role:'user',createdAt:new Date().toISOString()});
    }
  }

  // Restaurar sesión
  const saved=localStorage.getItem('rumbadoo_session');
  if(saved){
    try{
      const profile=await db.select(STORE_P,{id:JSON.parse(saved)});
      if(profile){currentUser=profile;showMain();return}
    }catch(e){}
  }
  showAuth();
}

// ─── PANTALLAS ───────────────────────────────────────────────
function showAuth(){authSc.classList.remove('hidden');mainSc.classList.add('hidden');adminSc.classList.add('hidden');authErr.textContent=''}
function showMain(){
  authSc.classList.add('hidden');mainSc.classList.remove('hidden');adminSc.classList.add('hidden');
  localStorage.setItem('rumbadoo_session',JSON.stringify(currentUser.id));
  if(currentUser.role==='admin'){showAdmin();return}
  loadDiscover();loadMatches();renderBadges();
}

// ─── AUTH ────────────────────────────────────────────────────
tabLogin.onclick=()=>{tabLogin.classList.add('active');tabRegister.classList.remove('active');loginForm.classList.remove('hidden');registerForm.classList.add('hidden');authErr.textContent=''}
tabRegister.onclick=()=>{tabRegister.classList.add('active');tabLogin.classList.remove('active');registerForm.classList.remove('hidden');loginForm.classList.add('hidden');authErr.textContent=''}

loginForm.onsubmit=async e=>{
  e.preventDefault();
  const name=$('login-name').value.trim(),pass=$('login-pass').value;
  if(!name||!pass){authErr.textContent='Completa todos los campos.';return}
  try{
    if(name==='admin'){
      const a=await db.select(STORE_P,{index:'by_name',value:'__admin__'});
      if(a&&a[0]&&a[0].password===hashPass(pass)){
        currentUser=a[0];localStorage.setItem('rumbadoo_session',JSON.stringify(currentUser.id));showMain();return
      }
      authErr.textContent='Credenciales de admin inválidas.';return
    }
    const p=await db.select(STORE_P,{index:'by_name',value:name});
    if(!p||!p.length){authErr.textContent='Ese usuario no existe.';return}
    if(p[0].password!==hashPass(pass)){authErr.textContent='Contraseña incorrecta.';return}
    currentUser=p[0];localStorage.setItem('rumbadoo_session',JSON.stringify(currentUser.id));showMain()
  }catch(e){authErr.textContent=e.message}
}

registerForm.onsubmit=async e=>{
  e.preventDefault();
  const name=$('reg-name').value.trim(),pass=$('reg-pass').value,age=parseInt($('reg-age').value,10);
  const gender=$('reg-gender').value,bio=$('reg-bio').value.trim();let photo=$('reg-photo').value.trim();
  if(!name){authErr.textContent='Ingresa tu nombre.';return}
  if(pass.length<4){authErr.textContent='La contraseña debe tener al menos 4 caracteres.';return}
  if(!age||age<18){authErr.textContent='Debes tener al menos 18 años.';return}
  const dup=await db.select(STORE_P,{index:'by_name',value:name});
  if(dup&&dup.length){authErr.textContent='Ese nombre ya está en uso.';return}
  if(!photo)photo=avatarUrl(name);
  const profile={id:genId(),name,password:hashPass(pass),age,gender,bio:bio||'Nuevo en Rumbadoo 💜',photo,role:'user',createdAt:new Date().toISOString()};
  await db.insert(STORE_P,profile);currentUser=profile;localStorage.setItem('rumbadoo_session',JSON.stringify(currentUser.id));showMain()
}

$('reg-photo').oninput=function(){const v=this.value.trim();if(v)$('avatar-preview').src=v;else $('avatar-preview').src=avatarUrl($('reg-name').value.trim()||'T')}
$('reg-name').oninput=function(){if(!$('reg-photo').value.trim())$('avatar-preview').src=avatarUrl(this.value.trim()||'T')}
$('btn-logout').onclick=()=>{currentUser=null;localStorage.removeItem('rumbadoo_session');showAuth()}

// ─── DESCUBRIR ───────────────────────────────────────────────
async function loadDiscover(){
  if(!currentUser||currentUser.role==='admin'||loading)return;loading=true
  try{
    const all=await db.selectAll(STORE_P)||[];
    const ints=await db.selectAll(STORE_I)||[];
    const interacted=new Set(ints.filter(i=>i.fromId===currentUser.id).map(i=>i.toId));
    let avail=(all||[]).filter(p=>p.id!==currentUser.id&&p.role!=='admin'&&!interacted.has(p.id));
    if(!avail.length){cardStack.innerHTML='';noMore.classList.remove('hidden');cardActions.classList.add('hidden');return}
    noMore.classList.add('hidden');cardActions.classList.remove('hidden')
    avail.sort(()=>Math.random()-.5);showCard(avail[0])
  }catch(e){console.error(e)}finally{loading=false}
}

function showCard(p){
  cardStack.innerHTML=''
  const c=document.createElement('div');c.className='profile-card';c.dataset.profileId=p.id
  c.innerHTML=`<img class="card-bg" src="${p.photo}" alt="${p.name}" draggable="false"><div class="card-overlay"></div><div class="swipe-indicator like">❤️</div><div class="swipe-indicator nope">👎</div><div class="card-info"><div class="card-name">${p.name} <span class="card-age">${p.age}</span></div><div class="card-bio">${p.bio||''}</div><span class="card-gender">${p.gender||''}</span></div>`
  cardStack.appendChild(c);setupSwipe(c);c.style.animation='fadeUp .35s ease backwards'
}

// ─── SWIPE ───────────────────────────────────────────────────
let sx=0,sy=0,isDrag=false,curCard=null;

function setupSwipe(c){
  const ind={like:c.querySelector('.swipe-indicator.like'),nope:c.querySelector('.swipe-indicator.nope')}
  const start=(x,y)=>{if(isSwiping||loading)return;isDrag=true;sx=x;sy=y;c.classList.add('swiping');curCard=c}
  const move=(x,y)=>{if(!isDrag||!curCard)return;const dx=x-sx;curCard.style.transform=`translate(${dx}px,${y-sy}px) rotate(${dx*.08}deg)`;if(dx>30){ind.like.classList.add('show');ind.nope.classList.remove('show')}else if(dx<-30){ind.nope.classList.add('show');ind.like.classList.remove('show')}else{ind.like.classList.remove('show');ind.nope.classList.remove('show')}}
  const end=()=>{if(!isDrag||!curCard)return;isDrag=false;ind.like.classList.remove('show');ind.nope.classList.remove('show');const dx=(curCard.getBoundingClientRect().left+curCard.offsetWidth/2)-(window.innerWidth/2);if(Math.abs(dx)>80)handleAction(curCard.dataset.profileId,dx>0?'like':'pass');else{curCard.style.transition='transform .3s ease';curCard.style.transform='';setTimeout(()=>{if(curCard)curCard.classList.remove('swiping')},300)}}
  c.onmousedown=e=>{e.preventDefault();start(e.clientX,e.clientY)}
  document.onmousemove=e=>{if(isDrag)move(e.clientX,e.clientY)}
  document.onmouseup=()=>{if(isDrag)end()}
  c.addEventListener('touchstart',e=>{const t=e.touches[0];start(t.clientX,t.clientY)},{passive:true})
  c.addEventListener('touchmove',e=>{if(isDrag){const t=e.touches[0];move(t.clientX,t.clientY)}},{passive:true})
  c.addEventListener('touchend',()=>{if(isDrag)end()},{passive:true})
}

// ─── ACCIONES ────────────────────────────────────────────────
async function handleAction(pid,type){
  if(isSwiping||loading)return;isSwiping=true
  const c=document.querySelector('.profile-card');
  if(c){const d=type==='like'?1:-1;c.style.transition='transform .5s ease,opacity .5s ease';c.style.transform=`translateX(${d*140}%) rotate(${d*24}deg)`;c.style.opacity='0'}
  setTimeout(async()=>{
    try{
      const id=genId();const interaction={id,fromId:currentUser.id,toId:pid,type,createdAt:new Date().toISOString()}
      await db.insert(STORE_I,interaction)
      let match=null
      if(type==='like'){
        const their=await db.select(STORE_I,{index:'by_from',value:pid})||[]
        if(their.some(i=>i.toId===currentUser.id&&i.type==='like')){
          const existing=await db.selectAll(STORE_M)||[]
          if(!existing.some(m=>(m.user1Id===currentUser.id&&m.user2Id===pid)||(m.user1Id===pid&&m.user2Id===currentUser.id))){
            const mid=genId();match={id:mid,user1Id:currentUser.id,user2Id:pid,createdAt:new Date().toISOString()}
            await db.insert(STORE_M,match)
          }
        }
      }
      if(match){
        const p=await db.select(STORE_P,{id:pid})
        if(p){matchMyAvatar.src=currentUser.photo;matchTheirAvatar.src=p.photo;matchModal.classList.remove('hidden');spawnHearts();spawnConfetti()}
      }
    }catch(e){console.error(e)}
    try{await loadDiscover();await loadMatches();renderBadges()}catch(e){}finally{isSwiping=false}
  },400)
}

btnLike.onclick=()=>{const c=document.querySelector('.profile-card');if(c)handleAction(c.dataset.profileId,'like')}
btnPass.onclick=()=>{const c=document.querySelector('.profile-card');if(c)handleAction(c.dataset.profileId,'pass')}
btnSuper.onclick=()=>{const c=document.querySelector('.profile-card');if(c)handleAction(c.dataset.profileId,'like')}
document.onkeydown=e=>{if(e.key==='ArrowRight')btnLike.click();if(e.key==='ArrowLeft')btnPass.click();if(e.key==='ArrowUp')btnSuper.click()}

// ─── MATCHES ─────────────────────────────────────────────────
async function loadMatches(){
  if(!currentUser||currentUser.role==='admin')return
  try{
    const all=await db.selectAll(STORE_M)||[]
    const my=all.filter(m=>m.user1Id===currentUser.id||m.user2Id===currentUser.id)
    matchesGrid.innerHTML=''
    if(!my.length){matchesEmpty.classList.remove('hidden');matchCount.textContent='0';return}
    matchesEmpty.classList.add('hidden');matchCount.textContent=my.length
    const ids=my.map(m=>m.user1Id===currentUser.id?m.user2Id:m.user1Id)
    const profiles=await Promise.all(ids.map(id=>db.select(STORE_P,{id}).catch(()=>null)))
    profiles.forEach((p,i)=>{
      if(!p)return;const d=document.createElement('div');d.className='match-card';d.style.animationDelay=`${i*.08}s`
      d.innerHTML=`<img src="${p.photo}" alt="${p.name}" loading="lazy"><div class="match-name">${p.name}</div><div class="match-age">${p.age} años 💜</div>`
      matchesGrid.appendChild(d)
    })
  }catch(e){console.error(e)}
}

// ─── MODAL MATCH ─────────────────────────────────────────────
matchContinue.onclick=()=>matchModal.classList.add('hidden')
matchModal.onclick=e=>{if(e.target===matchModal)matchModal.classList.add('hidden')}
function spawnHearts(){
  const emojis=['💜','❤️','💕','💗','🌸','✨']
  for(let i=0;i<18;i++)setTimeout(()=>{const e=document.createElement('div');e.className='heart-particle';e.textContent=emojis[Math.floor(Math.random()*emojis.length)];e.style.left=Math.random()*100+'vw';e.style.top='60%';e.style.fontSize=(14+Math.random()*20)+'px';document.body.appendChild(e);setTimeout(()=>e.remove(),2600)},i*80)
}
function spawnConfetti(){
  const colors=['#8b5cf6','#ec4899','#f43f5e','#fbbf24','#34d399','#60a5fa','#c084fc','#e879f9']
  for(let i=0;i<40;i++)setTimeout(()=>{const e=document.createElement('div');e.className='confetti-piece';e.style.left=Math.random()*100+'vw';e.style.top='40%';e.style.background=colors[i%colors.length];e.style.width=(6+Math.random()*8)+'px';e.style.height=(6+Math.random()*8)+'px';e.style.borderRadius=Math.random()>.5?'50%':'2px';e.style.transform=`rotate(${Math.random()*360}deg)`;document.body.appendChild(e);setTimeout(()=>e.remove(),2600)},i*40)
}

// ─── BADGES ──────────────────────────────────────────────────
async function renderBadges(){
  if(!currentUser||currentUser.role==='admin')return
  try{const all=await db.selectAll(STORE_M)||[];const c=all.filter(m=>m.user1Id===currentUser.id||m.user2Id===currentUser.id).length;if(c>0){matchesBadge.textContent=c;matchesBadge.classList.remove('hidden')}else matchesBadge.classList.add('hidden')}catch(e){}
}

// ─── LIKES ───────────────────────────────────────────────────
$('btn-likes').onclick=async()=>{
  if(!currentUser)return
  const all=await db.selectAll(STORE_I)||[]
  const likes=all.filter(i=>i.fromId===currentUser.id&&i.type==='like')
  if(!likes.length){alert('💜 No has dado like a nadie aún. ¡Explora perfiles!');return}
  const matches=await db.selectAll(STORE_M)||[]
  let msg='💜 Personas que te gustaron:\n\n'
  for(const l of likes){
    const p=await db.select(STORE_P,{id:l.toId})
    if(p){const isMatch=matches.some(m=>(m.user1Id===currentUser.id&&m.user2Id===p.id)||(m.user1Id===p.id&&m.user2Id===currentUser.id));msg+=`• ${p.name}, ${p.age} ${isMatch?'💕 (Match!)':'⏳'}\n`}
  }
  msg+=`\nTotal: ${likes.length} likes`;alert(msg)
}

// ─── EDITAR PERFIL ───────────────────────────────────────────
$('btn-profile').onclick=()=>{
  if(!currentUser)return;const u=currentUser;editName.value=u.name;editAge.value=u.age;editGender.value=u.gender||'Hombre';editBio.value=u.bio||'';editPhotoPreview.src=u.photo;editPhotoUrl.value='';editPhotoFile.value='';editOverlay.classList.remove('hidden')
}
editCancel.onclick=()=>editOverlay.classList.add('hidden')
editOverlay.onclick=e=>{if(e.target===editOverlay)editOverlay.classList.add('hidden')}
editPhotoFile.onchange=function(){const f=this.files[0];if(!f)return;const r=new FileReader();r.onload=function(e){editPhotoPreview.src=e.target.result;editPhotoUrl.value=''};r.readAsDataURL(f)}
editPhotoUrl.oninput=function(){const v=this.value.trim();if(v)editPhotoPreview.src=v}
editForm.onsubmit=async e=>{
  e.preventDefault();if(!currentUser)return
  const n=editName.value.trim(),a=parseInt(editAge.value,10),g=editGender.value,b=editBio.value.trim();let p=editPhotoPreview.src
  if(!n){alert('El nombre no puede estar vacío.');return}
  if(!a||a<18){alert('Debes tener al menos 18 años.');return}
  const uv=editPhotoUrl.value.trim();if(uv)p=uv
  try{
    if(n!==currentUser.name){const d=await db.select(STORE_P,{index:'by_name',value:n});if(d&&d.length){alert('Ese nombre ya está en uso.');return}}
    const upd={...currentUser,name:n,age:a,gender:g,bio:b||'Nuevo en Rumbadoo 💜',photo:p}
    await db.update(STORE_P,upd);currentUser=upd;editOverlay.classList.add('hidden');alert('💜 ¡Perfil actualizado correctamente!')
  }catch(e){alert(e.message)}
}

// ─── TABS ────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=async()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'))
    document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'))
    btn.classList.add('active');const pane=document.getElementById(btn.dataset.tab+'-pane');if(pane)pane.classList.add('active')
    if(btn.dataset.tab==='matches')await loadMatches()
  }
})

// ─── ADMIN ───────────────────────────────────────────────────
async function showAdmin(){
  authSc.classList.add('hidden');mainSc.classList.add('hidden');adminSc.classList.remove('hidden');await refreshAdmin()
}
async function refreshAdmin(){
  try{
    const all=await db.selectAll(STORE_P)||[],matches=await db.selectAll(STORE_M)||[],ints=await db.selectAll(STORE_I)||[]
    const users=all.filter(p=>p.role!=='admin')
    $('admin-stats').innerHTML=`<div class="admin-stat-card"><div class="num">${users.length}</div><div class="label">Usuarios</div></div><div class="admin-stat-card"><div class="num">${matches.length}</div><div class="label">Matches</div></div><div class="admin-stat-card"><div class="num">${ints.length}</div><div class="label">Interacciones</div></div>`
    const list=$('admin-profile-list');list.innerHTML=''
    if(!users.length){list.innerHTML='<p style="color:var(--g400);text-align:center;padding:20px;">No hay usuarios registrados.</p>';return}
    users.forEach(u=>{
      const d=document.createElement('div');d.className='admin-profile-item'
      d.innerHTML=`<img src="${u.photo}" alt="${u.name}"><div class="info"><div class="name">${u.name}</div><div class="detail">${u.age||'?'} años · ${u.gender||'—'}</div></div><button class="admin-del-btn" data-id="${u.id}">Eliminar</button>`
      list.appendChild(d)
      d.querySelector('.admin-del-btn').onclick=async()=>{
        if(!confirm(`¿Eliminar a ${u.name}?`))return
        const relI=ints.filter(i=>i.fromId===u.id||i.toId===u.id);for(const x of relI)await db.delete(STORE_I,x.id)
        const relM=matches.filter(m=>m.user1Id===u.id||m.user2Id===u.id);for(const x of relM)await db.delete(STORE_M,x.id)
        await db.delete(STORE_P,u.id);await refreshAdmin()
      }
    })
  }catch(e){console.error(e)}
}
adminClose.onclick=()=>{
  adminSc.classList.add('hidden')
  if(currentUser&&currentUser.role==='admin'){currentUser=null;localStorage.removeItem('rumbadoo_session');showAuth()}
  else showMain()
}

// ─── INICIAR ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',init);
</script>
