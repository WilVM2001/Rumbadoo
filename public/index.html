<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rumbadoo - Encuentra tu ritmo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

    :root {
      --purple-900: #2d1b69;
      --purple-800: #4a2c8a;
      --purple-700: #6b3fa0;
      --purple-600: #8b5cf6;
      --purple-500: #a78bfa;
      --purple-400: #c4b5fd;
      --purple-300: #ddd6fe;
      --purple-200: #ede9fe;
      --purple-100: #f5f3ff;
      --lavender:    #e6d5f5;
      --lilac:       #d8b4fe;
      --violet:      #7c3aed;
      --pink-accent: #ec4899;
      --rose:        #f43f5e;
      --gold:        #fbbf24;
      --white:       #ffffff;
      --gray-50:     #fafafa;
      --gray-100:    #f4f4f5;
      --gray-200:    #e4e4e7;
      --gray-300:    #d4d4d8;
      --gray-400:    #a1a1aa;
      --gray-500:    #71717a;
      --gray-600:    #52525b;
      --gray-700:    #3f3f46;
      --gray-800:    #27272a;
      --gray-900:    #18181b;
      --shadow-sm:   0 1px 2px rgba(0,0,0,.05);
      --shadow:      0 4px 24px rgba(74,44,138,.12);
      --shadow-lg:   0 8px 40px rgba(74,44,138,.18);
      --shadow-xl:   0 20px 60px rgba(74,44,138,.25);
      --radius:      20px;
      --radius-sm:   12px;
      --radius-full: 9999px;
      --transition:  0.3s cubic-bezier(.4,0,.2,1);
      --font:        'Nunito', system-ui, -apple-system, sans-serif;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height:100%;
      font-family:var(--font);
      background: linear-gradient(135deg, #2d1b69 0%, #4a2c8a 30%, #6b3fa0 60%, #8b5cf6 100%);
      color:var(--gray-900);
      overflow:hidden;
    }

    body::before {
      content:'';
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 30%, rgba(139,92,246,.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(196,181,253,.12) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(216,180,254,.08) 0%, transparent 60%);
      pointer-events:none;
      z-index:0;
    }

    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--purple-400); border-radius:3px; }

    #app {
      position:relative;
      z-index:1;
      width:100%;
      max-width:480px;
      height:100vh;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      background:var(--white);
      box-shadow:var(--shadow-xl);
      overflow:hidden;
    }

    /* ============================================================
       PANTALLA DE AUTENTICACIÓN
       ============================================================ */
    #auth-screen {
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:32px 24px;
      background: linear-gradient(160deg, var(--purple-100) 0%, var(--white) 50%, var(--purple-200) 100%);
      overflow-y:auto;
    }
    #auth-screen.hidden { display:none; }

    .auth-logo {
      font-size:48px;
      font-weight:900;
      background: linear-gradient(135deg, var(--purple-700), var(--pink-accent));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      margin-bottom:4px;
      letter-spacing:-1px;
    }
    .auth-sub {
      color:var(--gray-500);
      font-size:14px;
      margin-bottom:8px;
      font-weight:600;
    }

    .auth-toggle {
      display:flex;
      gap:4px;
      background:var(--purple-100);
      border-radius:var(--radius-full);
      padding:4px;
      margin-bottom:24px;
      width:100%;
      max-width:360px;
    }
    .auth-toggle button {
      flex:1;
      padding:10px 16px;
      border:none;
      border-radius:var(--radius-full);
      font-family:var(--font);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:var(--transition);
      background:transparent;
      color:var(--gray-500);
    }
    .auth-toggle button.active {
      background:var(--white);
      color:var(--purple-700);
      box-shadow:var(--shadow);
    }
    .auth-toggle button:hover { color:var(--purple-600); }

    .auth-form {
      width:100%;
      max-width:360px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .auth-form.hidden { display:none; }

    .auth-form label {
      font-size:13px;
      font-weight:700;
      color:var(--purple-800);
      margin-bottom:-8px;
    }
    .auth-form input,
    .auth-form select,
    .auth-form textarea {
      width:100%;
      padding:12px 16px;
      border:2px solid var(--purple-200);
      border-radius:var(--radius-sm);
      font-family:var(--font);
      font-size:15px;
      background:var(--white);
      transition:var(--transition);
      outline:none;
    }
    .auth-form input:focus,
    .auth-form select:focus,
    .auth-form textarea:focus {
      border-color:var(--purple-500);
      box-shadow:0 0 0 4px rgba(139,92,246,.15);
    }
    .auth-form textarea {
      resize:vertical;
      min-height:64px;
    }

    .btn-primary {
      padding:14px 24px;
      border:none;
      border-radius:var(--radius-full);
      font-family:var(--font);
      font-size:16px;
      font-weight:800;
      color:var(--white);
      background: linear-gradient(135deg, var(--purple-600), var(--violet));
      cursor:pointer;
      transition:var(--transition);
      box-shadow:0 4px 16px rgba(139,92,246,.35);
      letter-spacing:0.3px;
    }
    .btn-primary:hover {
      transform:translateY(-2px);
      box-shadow:0 6px 24px rgba(139,92,246,.45);
    }
    .btn-primary:active { transform:translateY(0); }
    .btn-danger {
      background: linear-gradient(135deg, var(--rose), #e11d48);
      box-shadow:0 4px 16px rgba(244,63,94,.35);
    }
    .btn-danger:hover { box-shadow:0 6px 24px rgba(244,63,94,.45); }

    .avatar-preview-wrap {
      display:flex;
      align-items:center;
      gap:12px;
      margin-top:4px;
    }
    .avatar-preview-wrap img {
      width:56px; height:56px;
      border-radius:50%;
      object-fit:cover;
      border:3px solid var(--purple-300);
      background:var(--purple-100);
    }

    .auth-error {
      color:var(--rose);
      font-size:13px;
      font-weight:600;
      text-align:center;
      min-height:20px;
    }

    /* ============================================================
       PANTALLA PRINCIPAL
       ============================================================ */
    #main-screen {
      flex:1;
      display:flex;
      flex-direction:column;
      background: linear-gradient(180deg, var(--purple-50, #faf5ff) 0%, var(--white) 100%);
    }
    #main-screen.hidden { display:none; }

    .main-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:16px 20px 8px;
      background:rgba(255,255,255,.85);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      position:relative;
      z-index:10;
    }
    .main-header .logo {
      font-size:22px;
      font-weight:900;
      background: linear-gradient(135deg, var(--purple-700), var(--pink-accent));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .header-actions {
      display:flex;
      align-items:center;
      gap:8px;
    }
    .header-btn {
      background:none;
      border:none;
      font-size:20px;
      cursor:pointer;
      padding:8px;
      border-radius:50%;
      transition:var(--transition);
      position:relative;
      color:var(--gray-600);
    }
    .header-btn:hover { background:var(--purple-100); color:var(--purple-700); }
    .badge {
      position:absolute;
      top:0; right:0;
      background:var(--rose);
      color:var(--white);
      font-size:10px;
      font-weight:800;
      min-width:18px; height:18px;
      border-radius:var(--radius-full);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 4px;
      transform:translate(4px,-4px);
    }

    .tab-bar {
      display:flex;
      background:rgba(255,255,255,.85);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border-bottom:1px solid var(--purple-100);
      position:relative;
      z-index:10;
      padding:0 8px;
    }
    .tab-btn {
      flex:1;
      padding:10px 8px 12px;
      background:none;
      border:none;
      font-family:var(--font);
      font-size:13px;
      font-weight:700;
      color:var(--gray-400);
      cursor:pointer;
      transition:var(--transition);
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
    }
    .tab-btn .tab-icon { font-size:18px; }
    .tab-btn.active { color:var(--purple-700); }
    .tab-btn.active::after {
      content:'';
      position:absolute;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      width:32px;
      height:3px;
      background: linear-gradient(90deg, var(--purple-500), var(--violet));
      border-radius:3px 3px 0 0;
    }
    .tab-btn:hover { color:var(--purple-600); }

    .tab-content {
      flex:1;
      overflow:hidden;
      position:relative;
    }
    .tab-pane {
      position:absolute;
      inset:0;
      overflow-y:auto;
      padding:16px;
      display:none;
    }
    .tab-pane.active { display:block; }

    /* ============================================================
       TAB: DESCUBRIR
       ============================================================ */
    #discover-pane {
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:0;
    }
    #discover-pane.active { display:flex; }

    .card-stack {
      position:relative;
      width:100%;
      max-width:400px;
      height:480px;
      margin:12px auto 8px;
    }

    .profile-card {
      position:absolute;
      width:100%;
      height:100%;
      border-radius:var(--radius);
      overflow:hidden;
      background:var(--white);
      box-shadow:var(--shadow-lg);
      transition:transform 0.35s ease, opacity 0.35s ease;
      cursor:grab;
      user-select:none;
      touch-action:none;
    }
    .profile-card.swiping {
      transition:none;
      cursor:grabbing;
    }

    .profile-card .card-bg {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .profile-card .card-overlay {
      position:absolute;
      inset:0;
      background: linear-gradient(transparent 50%, rgba(0,0,0,.7));
    }
    .profile-card .card-info {
      position:absolute;
      bottom:0;
      left:0;
      right:0;
      padding:24px 20px 20px;
      color:var(--white);
    }
    .profile-card .card-name {
      font-size:26px;
      font-weight:800;
      letter-spacing:-0.5px;
    }
    .profile-card .card-age {
      font-weight:600;
      font-size:20px;
      opacity:.9;
    }
    .profile-card .card-bio {
      font-size:14px;
      font-weight:400;
      opacity:.85;
      margin-top:4px;
      line-height:1.4;
    }
    .profile-card .card-gender {
      display:inline-block;
      font-size:12px;
      font-weight:700;
      background:rgba(255,255,255,.2);
      backdrop-filter:blur(4px);
      padding:2px 12px;
      border-radius:var(--radius-full);
      margin-top:6px;
    }

    .swipe-indicator {
      position:absolute;
      top:32px;
      padding:8px 20px;
      border-radius:var(--radius-sm);
      font-size:28px;
      font-weight:900;
      opacity:0;
      transform:rotate(-16deg);
      pointer-events:none;
      transition:opacity 0.15s;
      z-index:5;
    }
    .swipe-indicator.like {
      left:24px;
      color:var(--rose);
      border:4px solid var(--rose);
      text-shadow:0 2px 8px rgba(0,0,0,.2);
    }
    .swipe-indicator.nope {
      right:24px;
      color:var(--gray-400);
      border:4px solid var(--gray-400);
      text-shadow:0 2px 8px rgba(0,0,0,.2);
    }
    .swipe-indicator.show { opacity:1; }

    .card-actions {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:24px;
      padding:8px 0 16px;
    }
    .action-btn {
      width:60px; height:60px;
      border-radius:50%;
      border:none;
      font-size:28px;
      cursor:pointer;
      transition:var(--transition);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow);
      background:var(--white);
    }
    .action-btn:hover { transform:scale(1.1); }
    .action-btn:active { transform:scale(.9); }
    .action-btn.pass {
      color:var(--gray-400);
      border:2px solid var(--gray-200);
    }
    .action-btn.pass:hover {
      border-color:var(--gray-400);
      box-shadow:0 4px 16px rgba(0,0,0,.1);
    }
    .action-btn.like {
      color:var(--rose);
      border:2px solid #fecdd3;
    }
    .action-btn.like:hover {
      background:#fff1f2;
      border-color:var(--rose);
      box-shadow:0 4px 20px rgba(244,63,94,.25);
    }
    .action-btn.super {
      color:var(--gold);
      border:2px solid #fef3c7;
      font-size:22px;
    }
    .action-btn.super:hover {
      background:#fffbeb;
      border-color:var(--gold);
      box-shadow:0 4px 20px rgba(251,191,36,.25);
    }

    .no-more {
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:40px 24px;
      color:var(--gray-500);
    }
    .no-more .emoji-big { font-size:64px; margin-bottom:12px; }
    .no-more h3 { font-size:20px; font-weight:800; color:var(--purple-700); margin-bottom:4px; }
    .no-more p { font-size:14px; }

    /* ============================================================
       TAB: MATCHES
       ============================================================ */
    #matches-pane .section-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
    }
    #matches-pane .section-header h2 {
      font-size:20px;
      font-weight:800;
      color:var(--purple-800);
    }
    .match-count {
      background: var(--purple-100);
      color: var(--purple-700);
      padding: 2px 14px;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 800;
    }
    .matches-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(140px,1fr));
      gap:12px;
    }
    .match-card {
      background:var(--white);
      border-radius:var(--radius-sm);
      overflow:hidden;
      box-shadow:var(--shadow);
      transition:var(--transition);
      text-align:center;
      padding-bottom:12px;
      animation:fadeUp 0.4s ease backwards;
      border:2px solid transparent;
    }
    .match-card:hover {
      transform:translateY(-3px);
      box-shadow:var(--shadow-lg);
      border-color:var(--purple-300);
    }
    .match-card img {
      width:100%;
      height:140px;
      object-fit:cover;
      display:block;
      background:var(--purple-100);
    }
    .match-card .match-name {
      font-weight:700;
      font-size:14px;
      margin-top:8px;
      color:var(--gray-800);
    }
    .match-card .match-age {
      font-size:12px;
      color:var(--gray-500);
      font-weight:600;
    }
    .empty-state {
      text-align:center;
      padding:60px 24px;
      color:var(--gray-400);
    }
    .empty-state .emoji-big { font-size:56px; margin-bottom:8px; }
    .empty-state h3 { font-weight:700; font-size:18px; color:var(--gray-500); }

    /* ============================================================
       MODAL MATCH
       ============================================================ */
    .match-modal-overlay {
      position:fixed;
      inset:0;
      z-index:1000;
      background:rgba(45,27,105,.7);
      backdrop-filter:blur(8px);
      display:flex;
      align-items:center;
      justify-content:center;
      animation:fadeIn 0.3s ease;
      padding:20px;
    }
    .match-modal-overlay.hidden { display:none; }

    .match-modal {
      background:var(--white);
      border-radius:var(--radius);
      padding:40px 32px 32px;
      text-align:center;
      max-width:400px;
      width:100%;
      box-shadow:var(--shadow-xl);
      animation:bounceIn 0.5s ease backwards;
      position:relative;
      overflow:hidden;
    }
    .match-modal::before {
      content:'';
      position:absolute;
      top:0; left:0; right:0;
      height:4px;
      background: linear-gradient(90deg, var(--purple-500), var(--pink-accent), var(--gold), var(--pink-accent), var(--purple-500));
      background-size:200% 100%;
      animation:shimmer 2s linear infinite;
    }
    .match-modal .match-emoji {
      font-size:72px;
      animation:heartBeat 1s ease infinite;
      display:block;
      margin-bottom:4px;
    }
    .match-modal h2 {
      font-size:32px;
      font-weight:900;
      background: linear-gradient(135deg, var(--purple-700), var(--pink-accent));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      margin-bottom:4px;
    }
    .match-modal p {
      color:var(--gray-500);
      font-weight:600;
      margin-bottom:20px;
    }
    .match-modal .match-profiles {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      margin-bottom:24px;
    }
    .match-modal .match-profiles img {
      width:80px; height:80px;
      border-radius:50%;
      object-fit:cover;
      border:3px solid var(--purple-300);
    }
    .match-modal .match-profiles .heart-icon {
      font-size:32px;
      color:var(--rose);
    }

    /* ============================================================
       MODAL EDITAR PERFIL
       ============================================================ */
    .edit-overlay {
      position:fixed;
      inset:0;
      z-index:900;
      background:rgba(45,27,105,.6);
      backdrop-filter:blur(6px);
      display:flex;
      align-items:center;
      justify-content:center;
      animation:fadeIn 0.25s ease;
      padding:20px;
    }
    .edit-overlay.hidden { display:none; }

    .edit-modal {
      background:var(--white);
      border-radius:var(--radius);
      padding:28px 24px;
      max-width:400px;
      width:100%;
      max-height:90vh;
      overflow-y:auto;
      box-shadow:var(--shadow-xl);
      animation:bounceIn 0.35s ease backwards;
    }
    .edit-modal h2 {
      font-size:22px;
      font-weight:800;
      color:var(--purple-800);
      text-align:center;
      margin-bottom:20px;
    }
    .edit-form {
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .edit-form label {
      font-size:13px;
      font-weight:700;
      color:var(--purple-800);
      margin-bottom:-8px;
    }
    .edit-form input,
    .edit-form select,
    .edit-form textarea {
      width:100%;
      padding:12px 16px;
      border:2px solid var(--purple-200);
      border-radius:var(--radius-sm);
      font-family:var(--font);
      font-size:15px;
      background:var(--white);
      transition:var(--transition);
      outline:none;
    }
    .edit-form input:focus,
    .edit-form select:focus,
    .edit-form textarea:focus {
      border-color:var(--purple-500);
      box-shadow:0 0 0 4px rgba(139,92,246,.15);
    }
    .edit-form textarea { resize:vertical; min-height:56px; }

    .edit-photo-area {
      display:flex;
      align-items:center;
      gap:14px;
    }
    .edit-photo-area img {
      width:64px; height:64px;
      border-radius:50%;
      object-fit:cover;
      border:3px solid var(--purple-300);
      background:var(--purple-100);
      flex-shrink:0;
    }
    .edit-photo-area .photo-inputs {
      flex:1;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .edit-photo-area .photo-inputs input[type="file"] {
      font-size:13px;
      padding:6px 0;
      border:none;
    }
    .edit-photo-area .photo-inputs input[type="url"] {
      font-size:13px;
      padding:8px 12px;
    }
    .edit-actions {
      display:flex;
      gap:10px;
      margin-top:4px;
    }
    .edit-actions .btn-primary { flex:1; }
    .btn-secondary {
      flex:1;
      padding:14px 24px;
      border:2px solid var(--purple-200);
      border-radius:var(--radius-full);
      font-family:var(--font);
      font-size:16px;
      font-weight:800;
      color:var(--gray-500);
      background:var(--white);
      cursor:pointer;
      transition:var(--transition);
    }
    .btn-secondary:hover {
      border-color:var(--purple-400);
      color:var(--purple-700);
      background:var(--purple-50);
    }

    /* ============================================================
       ADMIN PANEL
       ============================================================ */
    #admin-screen {
      position:fixed;
      inset:0;
      z-index:500;
      background:var(--white);
      display:flex;
      flex-direction:column;
      animation:fadeIn 0.3s ease;
    }
    #admin-screen.hidden { display:none; }

    .admin-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:16px 20px;
      background:var(--purple-900);
      color:var(--white);
    }

  <script>
    /* ==============================================================
       RUMBADOO — App full-stack (IndexedDB + API serverless)
       ============================================================== */

    // ─── Utilidades ──────────────────────────────────────────
    const $ = id => document.getElementById(id);

    function avatarUrl(name) {
      const c = ['8b5cf6','7c3aed','6b3fa0','4a2c8a','a78bfa','c4b5fd','ddd6fe','e6d5f5','2d1b69'];
      return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=${c[name.length % c.length]}&color=fff&size=256&bold=true`;
    }

    function hashPass(pw) {
      let h = 0;
      for (let i = 0; i < pw.length; i++) { h = ((h << 5) - h) + pw.charCodeAt(i); h |= 0; }
      return 'h' + Math.abs(h).toString(36);
    }

    function genId() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    // ==============================================================
    //   CAPA 1: MiniSQL (IndexedDB) — funciona offline, sin servidor
    // ==============================================================
    class MiniSQL {
      constructor(dbName, version) {
        this.dbName = dbName;
        this.version = version;
        this.db = null;
      }
      open(stores) {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(this.dbName, this.version);
          req.onupgradeneeded = (ev) => {
            const db = ev.target.result;
            stores.forEach(s => {
              if (!db.objectStoreNames.contains(s.name)) {
                const store = db.createObjectStore(s.name, { keyPath: s.key || 'id', autoIncrement: !!s.auto });
                if (s.indexes) s.indexes.forEach(idx => store.createIndex(idx.name, idx.key, idx.opts || {}));
              }
            });
          };
          req.onsuccess = (ev) => { this.db = ev.target.result; resolve(); };
          req.onerror = (ev) => reject(ev.target.error);
        });
      }
      insert(storeName, data) {
        return new Promise((resolve, reject) => {
          const tx = this.db.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          const req = store.put(data);
          req.onsuccess = () => resolve(data);
          req.onerror = () => reject(req.error);
        });
      }
      select(storeName, query) {
        return new Promise((resolve, reject) => {
          const tx = this.db.transaction(storeName, 'readonly');
          const store = tx.objectStore(storeName);
          let req;
          if (!query) req = store.getAll();
          else if (query.id) req = store.get(query.id);
          else if (query.index && query.value) req = store.index(query.index).getAll(query.value);
          else req = store.getAll();
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }
      selectAll(storeName) { return this.select(storeName); }
      update(storeName, data) { return this.insert(storeName, data); }
      delete(storeName, id) {
        return new Promise((resolve, reject) => {
          const tx = this.db.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          store.delete(id);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      }
    }

    // ==============================================================
//   CAPA 2: APIDB — Conexión al backend (Vercel serverless)
    // ==============================================================
    class APIDB {
      constructor() { this.base = window.location.origin + '/api'; }

      async api(path, opts = {}) {
        const headers = { 'Content-Type': 'application/json', ...opts.headers };
        if (currentUser) headers['x-user-id'] = currentUser.id;
        const res = await fetch(this.base + path, { headers, ...opts });
        if (!res.ok) {
          const txt = await res.text().catch(() => '');
          try { const j = JSON.parse(txt); throw new Error(j.error || 'Error del servidor'); }
          catch(e) { if (e.message.includes('Error del servidor')) throw e; throw new Error('Error ' + res.status); }
        }
        return res.json();
      }

      async health() { try { await this.api('/health'); return true; } catch(e) { return false; } }

      async getProfile(id) {
        const d = await this.api('/profile/' + encodeURIComponent(id));
        return d.id ? d : null;
      }
      async getProfileByName(name) {
        const all = await this.api('/profiles');
        return all.find(p => p.name === name) || null;
      }
      async getAllProfiles(excludeId) {
        return this.api('/profiles?exclude=' + encodeURIComponent(excludeId || ''));
      }
      async createProfile(data) {
        return this.api('/register', { method: 'POST', body: JSON.stringify(data) });
      }
      async updateProfile(id, data) {
        return this.api('/profile/' + encodeURIComponent(id), { method: 'PUT', body: JSON.stringify(data) });
      }
      async deleteProfile(id) { return this.adminDeleteProfile(id); }
      async getInteractionsByUser(userId) {
        return this.api('/interactions/' + encodeURIComponent(userId));
      }
      async createInteraction(fromId, toId, type) {
        return this.api('/interactions', {
          method: 'POST',
          body: JSON.stringify({ fromId, toId, type })
        });
      }
      async getMatchesByUser(userId) {
        return this.api('/matches/' + encodeURIComponent(userId));
      }
      async getAdminStats() {
        const [stats, profiles] = await Promise.all([
          this.api('/admin/stats'),
          this.api('/profiles')
        ]);
        return { ...stats, profiles };
      }
      async adminDeleteProfile(id) {
        await this.api('/admin/profile/' + encodeURIComponent(id), { method: 'DELETE' });
      }
    }

    // ==============================================================
    //   CAPA 3: Data Layer Unificado
    // ==============================================================
    const data = {
      mode: 'api',      // 'api' | 'indexeddb'
      backend: null,     // APIDB instance
      mini: null,        // MiniSQL instance (fallback)

      async init() {
        // Intentar conectar al servidor primero
        this.backend = new APIDB();
        const serverUp = await this.backend.health();
        if (serverUp) { this.mode = 'api'; return; }

        // Si no hay servidor, usar IndexedDB
        console.log('💜 Servidor no disponible, usando modo local (IndexedDB)');
        this.mini = new MiniSQL('RumbadooDB', 1);
        const stores = [
          { name: 'profiles', key: 'id', indexes: [{ name: 'by_name', key: 'name' }] },
          { name: 'interactions', key: 'id', indexes: [{ name: 'by_from', key: 'fromId' }, { name: 'by_to', key: 'toId' }] },
          { name: 'matches', key: 'id', indexes: [{ name: 'by_user1', key: 'user1Id' }, { name: 'by_user2', key: 'user2Id' }] }
        ];
        await this.mini.open(stores);

        const admins = await this.mini.select('profiles', { index: 'by_name', value: '__admin__' });
        if (!admins || admins.length === 0) {
          await this.mini.insert('profiles', {
            id: 'admin_' + genId(), name: '__admin__',
            password: hashPass('admin123'), role: 'admin',
            createdAt: new Date().toISOString()
          });
        }
        this.mode = 'indexeddb';
      },

      isApiMode() { return this.mode === 'api'; },

      async getProfile(id) {
        if (this.mode === 'api') return this.backend.getProfile(id);
        return this.mini.select('profiles', { id });
      },
      async getProfileByName(name) {
        if (this.mode === 'api') return this.backend.getProfileByName(name);
        const rows = await this.mini.select('profiles', { index: 'by_name', value: name });
        return rows?.[0] || null;
      },
      async getAllProfiles(excludeId) {
        if (this.mode === 'api') return this.backend.getAllProfiles(excludeId);
        const all = await this.mini.selectAll('profiles');
        return (all || []).filter(p => p.id !== excludeId && p.role !== 'admin');
      },
      async createProfile(data) {
        if (this.mode === 'api') {
          const res = await this.backend.createProfile(data);
          return res.profile || { ...data, id: res.profile?.id || genId() };
        }
        const id = genId();
        data.id = id;
        await this.mini.insert('profiles', data);
        return data;
      },
      async updateProfile(id, data) {
        if (this.mode === 'api') {
          const res = await this.backend.updateProfile(id, data);
          return res.profile || data;
        }
        data.id = id;
        await this.mini.update('profiles', data);
        return data;
      },
      async deleteProfile(id) {
        if (this.mode === 'api') return this.backend.deleteProfile(id);
        const allI = await this.mini.selectAll('interactions') || [];
        for (const i of allI) { if (i.fromId === id || i.toId === id) await this.mini.delete('interactions', i.id); }
        const allM = await this.mini.selectAll('matches') || [];
        for (const m of allM) { if (m.user1Id === id || m.user2Id === id) await this.mini.delete('matches', m.id); }
        await this.mini.delete('profiles', id);
      },
      async getInteractionsByUser(userId) {
        if (this.mode === 'api') return this.backend.getInteractionsByUser(userId);
        const all = await this.mini.selectAll('interactions') || [];
        return all.filter(i => i.fromId === userId);
      },
      async createInteraction(fromId, toId, type) {
        if (this.mode === 'api') return this.backend.createInteraction(fromId, toId, type);
        const id = genId();
        const interaction = { id, fromId, toId, type, createdAt: new Date().toISOString() };
        await this.mini.insert('interactions', interaction);
        let match = null;
        if (type === 'like') {
          const theirLikes = await this.mini.select('interactions', { index: 'by_from', value: toId }) || [];
          if (theirLikes.some(i => i.toId === fromId && i.type === 'like')) {
            const existing = await this.mini.selectAll('matches') || [];
            if (!existing.some(m => (m.user1Id === fromId && m.user2Id === toId) || (m.user1Id === toId && m.user2Id === fromId))) {
              const mid = genId();
              match = { id: mid, user1Id: fromId, user2Id: toId, createdAt: new Date().toISOString() };
              await this.mini.insert('matches', match);
            }
          }
        }
        return { interactionId: id, match };
      },
      async getMatchesByUser(userId) {
        if (this.mode === 'api') return this.backend.getMatchesByUser(userId);
        const all = await this.mini.selectAll('matches') || [];
        return all.filter(m => m.user1Id === userId || m.user2Id === userId);
      },
      async getAdminStats() {
        if (this.mode === 'api') return this.backend.getAdminStats();
        const allProfiles = await this.mini.selectAll('profiles') || [];
        const allMatches = await this.mini.selectAll('matches') || [];
        const allInteractions = await this.mini.selectAll('interactions') || [];
        return { users: allProfiles.filter(p => p.role !== 'admin').length, matches: allMatches.length, interactions: allInteractions.length };
      },
      async adminDeleteProfile(id) {
        if (this.mode === 'api') return this.backend.adminDeleteProfile(id);
        return this.deleteProfile(id);
      }
    };

    // ==============================================================
    //   ESTADO GLOBAL
    // ==============================================================
    let currentUser = null;
    let isSwiping = false;
    let loading = false;

    // ==============================================================
    //   REFERENCIAS DOM
    // ==============================================================
    const authScreen       = $('auth-screen');
    const mainScreen       = $('main-screen');
    const loginForm        = $('login-form');
    const registerForm     = $('register-form');
    const tabLogin         = $('tab-login');
    const tabRegister      = $('tab-register');
    const authError        = $('auth-error');
    const cardStack        = $('card-stack');
    const noMore           = $('no-more');
    const cardActions      = $('card-actions');
    const btnLike          = $('btn-like');
    const btnPass          = $('btn-pass');
    const btnSuper         = $('btn-super');
    const matchesGrid      = $('matches-grid');
    const matchesEmpty     = $('matches-empty');
    const matchCount       = $('match-count');
    const matchModal       = $('match-modal');
    const matchMyAvatar    = $('match-my-avatar');
    const matchTheirAvatar = $('match-their-avatar');
    const matchContinue    = $('match-continue');
    const matchesBadge     = $('matches-badge');
    const adminScreen      = $('admin-screen');
    const adminClose       = $('admin-close');
    const editOverlay      = $('edit-overlay');
    const editForm         = $('edit-form');
    const editName         = $('edit-name');
    const editAge          = $('edit-age');
    const editGender       = $('edit-gender');
    const editBio          = $('edit-bio');

        </div>
      `;

    // ==============================================================
    //   INICIALIZACIÓN
    // ==============================================================
    async function init() {
      try {
        await data.init();
      } catch (e) {
        document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Nunito,sans-serif;background:linear-gradient(135deg,#2d1b69,#4a2c8a);color:white;padding:40px;text-align:center;font-size:16px;">
          <p>Error al inicializar la base de datos: ${e.message}</p>
        </div>`;
        return;
      }

      const saved = localStorage.getItem('rumbadoo_session');
      if (saved) {
        try {
          const sid = JSON.parse(saved);
          const profile = await data.getProfile(sid);
          if (profile) {
            currentUser = profile;
            showMainScreen();
            return;
          }
        } catch(e) { /* sesión expirada */ }
      }
      showAuthScreen();
    }

          if (admin && admin.password === hashPass(pass)) {

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name   = $('reg-name').value.trim();
      const pass   = $('reg-pass').value;

      const bio    = $('reg-bio').value.trim();

        const created = await data.createProfile({
          name,

          age,
          gender,
          bio: bio || 'Nuevo en Rumbadoo 💜',

    $('reg-name').addEventListener('input', function() {

    // ==============================================================
    //   DESCUBRIR
    // ==============================================================
    async function loadDiscover() {
      if (!currentUser || currentUser.role === 'admin' || loading) return;
      loading = true;

      try {
        const [profiles, interactions] = await Promise.all([
          data.getAllProfiles(currentUser.id),
          data.getInteractionsByUser(currentUser.id)
        ]);

        const interactedIds = new Set((interactions || []).map(i => i.toId));
        let available = (profiles || []).filter(p => !interactedIds.has(p.id));

        if (available.length === 0) {
          cardStack.innerHTML = '';
          noMore.classList.remove('hidden');
          cardActions.classList.add('hidden');
          return;
        }

        noMore.classList.add('hidden');
        cardActions.classList.remove('hidden');
        available.sort(() => Math.random() - 0.5);
        showCard(available[0]);
      } catch(e) {
        console.error('Error cargando perfiles:', e);
      } finally {
        loading = false;
      }
    }

    function showCard(profile) {
      cardStack.innerHTML = '';
      const card = document.createElement('div');
      card.className = 'profile-card';
      card.dataset.profileId = profile.id;
      card.innerHTML = `
        <img class="card-bg" src="${profile.photo}" alt="${profile.name}" draggable="false">
        <div class="card-overlay"></div>
        <div class="swipe-indicator like">❤️</div>
        <div class="swipe-indicator nope">👎</div>
        <div class="card-info">
          <div class="card-name">${profile.name} <span class="card-age">${profile.age}</span></div>
          <div class="card-bio">${profile.bio || ''}</div>
          <span class="card-gender">${profile.gender || ''}</span>
        </div>
      `;
      cardStack.appendChild(card);
      setupSwipe(card);
      card.style.animation = 'fadeUp 0.35s ease backwards';
    }

    // ==============================================================
    //   SWIPE
    // ==============================================================
    let swipeStartX = 0, swipeStartY = 0;
    let isDragging = false;
    let currentCard = null;

    function setupSwipe(card) {
      const indicators = {
        like: card.querySelector('.swipe-indicator.like'),
        nope: card.querySelector('.swipe-indicator.nope')
      };

      const onStart = (x, y) => {
        if (isSwiping || loading) return;
        isDragging = true;
        swipeStartX = x; swipeStartY = y;
        card.classList.add('swiping');
        currentCard = card;
      };
      const onMove = (x, y) => {
        if (!isDragging || !currentCard) return;
        const dx = x - swipeStartX;
        currentCard.style.transform = `translate(${dx}px, ${y - swipeStartY}px) rotate(${dx * 0.08}deg)`;
        if (dx > 30) { indicators.like.classList.add('show'); indicators.nope.classList.remove('show'); }
        else if (dx < -30) { indicators.nope.classList.add('show'); indicators.like.classList.remove('show'); }
        else { indicators.like.classList.remove('show'); indicators.nope.classList.remove('show'); }
      };
      const onEnd = () => {
        if (!isDragging || !currentCard) return;
        isDragging = false;
        indicators.like.classList.remove('show');
        indicators.nope.classList.remove('show');
        const dx = (currentCard.getBoundingClientRect().left + currentCard.offsetWidth / 2) - (window.innerWidth / 2);

        if (Math.abs(dx) > 80) {
          handleAction(currentCard.dataset.profileId, dx > 0 ? 'like' : 'pass');
        } else {
          currentCard.style.transition = 'transform 0.3s ease';
          currentCard.style.transform = '';
          setTimeout(() => { if (currentCard) currentCard.classList.remove('swiping'); }, 300);
        }
      };

      card.addEventListener('mousedown', e => { e.preventDefault(); onStart(e.clientX, e.clientY); });
      document.addEventListener('mousemove', e => { if (isDragging) onMove(e.clientX, e.clientY); });
      document.addEventListener('mouseup', () => { if (isDragging) onEnd(); });
      card.addEventListener('touchstart', e => { const t = e.touches[0]; onStart(t.clientX, t.clientY); }, { passive: true });
      card.addEventListener('touchmove', e => { if (isDragging) { const t = e.touches[0]; onMove(t.clientX, t.clientY); } }, { passive: true });
      card.addEventListener('touchend', () => { if (isDragging) onEnd(); }, { passive: true });
    }

    // ==============================================================
    //   ACCIONES
    // ==============================================================
    async function handleAction(profileId, type) {
      if (isSwiping || loading) return;
      isSwiping = true;

      const card = document.querySelector('.profile-card');
      if (card) {
        const dir = type === 'like' ? 1 : -1;
        card.style.transition = 'transform 0.5s ease, opacity 0.5s ease';
        card.style.transform = `translateX(${dir * 140}%) rotate(${dir * 24}deg)`;
        card.style.opacity = '0';
      }

      setTimeout(async () => {
        try {
          const result = await data.createInteraction(currentUser.id, profileId, type);

          if (result.match) {
            const theirProfile = await data.getProfile(profileId);
            if (theirProfile) {
              matchMyAvatar.src = currentUser.photo;
              matchTheirAvatar.src = theirProfile.photo;
              matchModal.classList.remove('hidden');
              spawnHearts();
              spawnConfetti();
            }
          }
        } catch(e) {
          console.error('Error en interacción:', e);
        }

        try {
          await loadDiscover();
          await loadMatches();
          renderBadges();
        } catch(e) {
          console.error('Error refrescando:', e);
        } finally {
          isSwiping = false;
        }
      }, 400);
    }

    btnLike.addEventListener('click', () => {
      const card = document.querySelector('.profile-card');
      if (card) handleAction(card.dataset.profileId, 'like');
    });
    btnPass.addEventListener('click', () => {
      const card = document.querySelector('.profile-card');
      if (card) handleAction(card.dataset.profileId, 'pass');
    });
    btnSuper.addEventListener('click', () => {
      const card = document.querySelector('.profile-card');
      if (card) handleAction(card.dataset.profileId, 'like');
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') btnLike.click();
      if (e.key === 'ArrowLeft') btnPass.click();
      if (e.key === 'ArrowUp') btnSuper.click();
    });

    // ==============================================================
    //   MATCHES
    // ==============================================================
    let matchesCache = {};

    async function loadMatches() {
      if (!currentUser || currentUser.role === 'admin') return;

      try {
        const allMatches = await data.getMatchesByUser(currentUser.id) || [];

        matchesGrid.innerHTML = '';

        if (allMatches.length === 0) {
          matchesEmpty.classList.remove('hidden');
          matchCount.textContent = '0';
          return;
        }

        matchesEmpty.classList.add('hidden');
        matchCount.textContent = allMatches.length;

        const profileIds = allMatches.map(m => m.user1Id === currentUser.id ? m.user2Id : m.user1Id);
        const profiles = await Promise.all(profileIds.map(id => data.getProfile(id).catch(() => null)));

        profiles.forEach((p, i) => {
          if (!p) return;
          const div = document.createElement('div');
          div.className = 'match-card';
          div.style.animationDelay = `${i * 0.08}s`;
          div.innerHTML = `
            <img src="${p.photo}" alt="${p.name}" loading="lazy">
            <div class="match-name">${p.name}</div>
            <div class="match-age">${p.age} años 💜</div>
          `;
          matchesGrid.appendChild(div);
        });
      } catch(e) {
        console.error('Error cargando matches:', e);
      }
    }

    // ==============================================================
    matchContinue.addEventListener('click', () => matchModal.classList.add('hidden'));
    matchModal.addEventListener('click', e => { if (e.target === matchModal) matchModal.classList.add('hidden'); });

    function spawnHearts() {
      const emojis = ['💜','❤️','💕','💗','🌸','✨'];
      for (let i = 0; i < 18; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'heart-particle';
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          el.style.left = Math.random() * 100 + 'vw';
          el.style.top = '60%';
          el.style.fontSize = (14 + Math.random() * 20) + 'px';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 2600);
        }, i * 80);

    function spawnConfetti() {
      const colors = ['#8b5cf6','#ec4899','#f43f5e','#fbbf24','#34d399','#60a5fa','#c084fc','#e879f9'];
      for (let i = 0; i < 40; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'confetti-piece';
          el.style.left = Math.random() * 100 + 'vw';
          el.style.top = '40%';
          el.style.background = colors[i % colors.length];
          el.style.width = (6 + Math.random() * 8) + 'px';
          el.style.height = (6 + Math.random() * 8) + 'px';

          document.body.appendChild(el);
          setTimeout(() => el.remove(), 2600);
        }, i * 40);
      }
    }

    // ==============================================================
    //   BADGES
    // ==============================================================
    async function renderBadges() {
      if (!currentUser || currentUser.role === 'admin') return;
      try {
        const allMatches = await data.getMatchesByUser(currentUser.id) || [];
        if (allMatches.length > 0) { matchesBadge.textContent = allMatches.length; matchesBadge.classList.remove('hidden'); }

    // ==============================================================

    // ==============================================================
    $('btn-likes').addEventListener('click', async () => {
      if (!currentUser) return;
      try {
        const allInteractions = await data.getInteractionsByUser(currentUser.id) || [];
        const myLikes = allInteractions.filter(i => i.type === 'like');
        if (myLikes.length === 0) {
          alert('💜 No has dado like a nadie aún. ¡Explora perfiles!');
          return;
        }

        const allMatches = await data.getMatchesByUser(currentUser.id) || [];
        let msg = '💜 Personas que te gustaron:\n\n';

        const profiles = await Promise.all(myLikes.map(l => data.getProfile(l.toId).catch(() => null)));
        profiles.forEach((p, i) => {
          if (!p) return;
          const isMatch = allMatches.some(m => (m.user1Id === currentUser.id && m.user2Id === p.id) || (m.user1Id === p.id && m.user2Id === currentUser.id));
          msg += `• ${p.name}, ${p.age} ${isMatch ? '💕 (Match!)' : '⏳'}\n`;
        });
        msg += `\nTotal: ${myLikes.length} likes`;
        alert(msg);
      } catch(e) { alert('Error al cargar likes.'); }

    editPhotoFile.addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) { editPhotoPreview.src = e.target.result; editPhotoUrl.value = ''; };
      reader.readAsDataURL(file);
    });

      const val = this.value.trim();

    editForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!currentUser) return;

      const name = editName.value.trim();
      const age = parseInt(editAge.value, 10);
      const gender = editGender.value;
      const bio = editBio.value.trim();
      let photo = editPhotoPreview.src;

      if (!name) { alert('El nombre no puede estar vacío.'); return; }
      if (!age || age < 18) { alert('Debes tener al menos 18 años.'); return; }

      const urlVal = editPhotoUrl.value.trim();
      if (urlVal) photo = urlVal;

      try {
        if (name !== currentUser.name) {
          const dup = await data.getProfileByName(name);
          if (dup) { alert('Ese nombre ya está en uso.'); return; }
        }

        const result = await data.updateProfile(currentUser.id, {
          name, age, gender, bio: bio || 'Nuevo en Rumbadoo 💜', photo
        });

    // ==============================================================
    //   ADMIN PANEL
    // ==============================================================
    async function showAdminPanel() {
      authScreen.classList.add('hidden');
      mainScreen.classList.add('hidden');
      adminScreen.classList.remove('hidden');
      await refreshAdminPanel();
    }

    async function refreshAdminPanel() {
      try {
        const [stats, profiles] = await Promise.all([
          data.getAdminStats(),
          data.getAllProfiles()
        ]);

        const users = (profiles || []).filter(p => p.role !== 'admin');

        $('admin-stats').innerHTML = `
          <div class="admin-stat-card"><div class="num">${stats.users}</div><div class="label">Usuarios</div></div>
          <div class="admin-stat-card"><div class="num">${stats.matches}</div><div class="label">Matches</div></div>
          <div class="admin-stat-card"><div class="num">${stats.interactions}</div><div class="label">Interacciones</div></div>
        `;

        const list = $('admin-profile-list');
        list.innerHTML = '';

        if (users.length === 0) {
          list.innerHTML = '<p style="color:var(--gray-400);text-align:center;padding:20px;">No hay usuarios.</p>';
          return;
        }

        users.forEach(u => {
          const div = document.createElement('div');
          div.className = 'admin-profile-item';
          div.innerHTML = `
            <img src="${u.photo}" alt="${u.name}">
            <div class="info">
              <div class="name">${u.name}</div>
              <div class="detail">${u.age || '?'} años · ${u.gender || '—'} · ${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : ''}</div>
            </div>
            <button class="admin-del-btn" data-id="${u.id}">Eliminar</button>
          `;
          list.appendChild(div);
          div.querySelector('.admin-del-btn').addEventListener('click', async () => {
            if (!confirm(`¿Eliminar a ${u.name}?`)) return;
            await data.adminDeleteProfile(u.id);
            await refreshAdminPanel();
          });
        });
      } catch(e) {
        console.error('Error admin:', e);
      }
    }

    adminClose.addEventListener('click', () => {
      adminScreen.classList.add('hidden');
      if (currentUser && currentUser.role === 'admin') {
        currentUser = null;
        localStorage.removeItem('rumbadoo_session');
        showAuthScreen();
      } else {
        showMainScreen();
      }
    });

    // ==============================================================
    //   ARRANQUE
    // ==============================================================
    document.addEventListener('DOMContentLoaded', init);
  </script>

</body>
</html>
